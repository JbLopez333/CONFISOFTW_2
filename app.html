<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Iniciar sesión</title>

  <!-- Bootstrap solo se usa por sus utilidades CSS base (esta página no usa sus componentes JS) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Variables de diseño (colores, fuentes) compartidas por toda la app -->
  <link rel="stylesheet" href="css/variables.css">
  <!-- Estilos generales de la aplicación (formularios, botones, tarjetas, etc.) -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ════════════════════════════════════════════════
     TARJETA DE LOGIN
     Página de entrada de la aplicación: correo, contraseña y rol.
════════════════════════════════════════════════ -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo y encabezado de la marca -->
    <div class="auth-logo">
      <div class="logo-circle">
        <img src="img/logo.jpeg" alt="ConfíComputos">
      </div>
      <h1>Confisoftw</h1>
      <p>Sistema de Gestión Empresarial</p>
    </div>

    <!-- Campo de correo electrónico -->
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="correo@conficomputos.com" autocomplete="off">
    </div>

    <!-- Campo de contraseña -->
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="off">
    </div>

    <!-- Selector de rol: debe coincidir con el rol real que tiene el usuario en la base de datos -->
    <div class="form-group">
      <label>Rol</label>
      <select id="login-rol">
    <option value="">— Selecciona tu rol —</option>
    <option value="administrador">🛡️ Administrador</option>
    <option value="usuario">👤 Usuario</option>
    <option value="cliente">🛒 Cliente</option>
</select>
    </div>

    <!-- Enlace que abre el modal de recuperación de contraseña (ver más abajo) -->
    <div style="text-align:right;margin-top:-10px;margin-bottom:14px">
      <button class="link-btn" id="btn-forgot" style="font-size:13px">🔑 Olvidé mi contraseña</button>
    </div>

    <!-- Botón de envío: dispara doLogin() en js/app.js, que llama a api/login.php -->
    <button class="btn btn-rosa btn-full btn-lg" id="btn-login">Iniciar sesión</button>
    <!-- Aquí se muestran los mensajes de error del login (correo no encontrado, contraseña incorrecta, etc.) -->
    <div class="form-error" id="login-error"></div>

    <!-- Enlace hacia el formulario de registro -->
    <div class="auth-footer">
      <span>¿No tienes cuenta?</span>
      <button class="link-btn" id="btn-ir-registro">Crear perfil gratis ✨</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      <a href="index.html" style="font-size:13px;color:var(--gris-400)">← Volver a la página principal</a>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     MODAL: OLVIDÉ MI CONTRASEÑA
     Se abre/cierra agregando o quitando la clase "open" (ver auth.js / app.js)
════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-forgot">
  <div class="modal-box" style="max-width:440px">

    <!-- PASO 1: el usuario ingresa el correo de su cuenta -->
    <div id="forgot-step-1">

    <h3 class="modal-title">🔑 Recuperar contraseña</h3>
    <p style="font-size:14px;color:var(--gris-500);margin-bottom:20px">
        Ingresa el correo con el que registraste tu cuenta.
    </p>
    <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email"
               id="forgot-email"
               placeholder="correo@conficomputos.com">
    </div>
    <div class="form-error" id="forgot-error-1"></div>

    <div class="modal-footer">
        <button class="btn btn-rosa" id="btn-send-reset">
            Continuar →
        </button>
    </div>
</div>
 

    <!-- PASO 2: el usuario define su nueva contraseña (debe cumplir mayúscula + número + símbolo, validado en app.js) -->
    <div id="forgot-step-3" style="display:none">
      <h3 class="modal-title">🔒 Nueva contraseña</h3>
      <p style="font-size:14px;color:var(--gris-500);margin-bottom:20px">Elige una nueva contraseña segura.</p>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="new-pass2" placeholder="Repite la contraseña">
      </div>
      <div class="form-error" id="forgot-error-3"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('modal-forgot').classList.remove('open')">Cancelar</button>
        <button class="btn btn-rosa" id="btn-save-pass">✅ Guardar contraseña</button>
      </div>
    </div>

  </div>
</div>

<!-- Contenedor donde se insertan dinámicamente las notificaciones tipo "toast" (UI.toast en auth.js) -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════
     SCRIPTS
     Orden importante: cada archivo depende del anterior.
════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/models.js"></script>    <!-- Clases de datos: Usuario, Producto, etc. -->
<script src="js/database.js"></script>  <!-- Acceso a la API (Supabase) y caché de datos -->
<script src="js/auth.js"></script>      <!-- Login, logout, sesión, notificaciones (UI.toast) -->
<script src="js/app.js"></script>       <!-- Lógica de esta página: login y registro -->
</body>
</html>
