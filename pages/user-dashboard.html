<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Mi cuenta</title>
  <!-- Bootstrap: se usa aquí sí para su componente "offcanvas" (menú lateral móvil) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/app.css">
  <style>
    /* ── Responsive fixes usuario ──
       Estos estilos son específicos de este panel (no viven en app.css)
       porque resuelven el comportamiento del sidebar en escritorio vs. móvil. */

    /* En pantallas angostas: ocultar el sidebar fijo de escritorio y el nombre en la topbar */
    @media(max-width:991px){
      .cc-sidebar-desktop{display:none!important}
      .tb-name-resp{display:none}
    }
    /* En pantallas anchas: ocultar el botón hamburguesa (no hace falta, ya se ve el sidebar fijo) */
    @media(min-width:992px){
      #btn-hamburger{display:none!important}
    }

    /* Botones de navegación dentro del menú offcanvas (versión móvil) */
    .offcanvas-sidebar .nav-link{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:15px;font-weight:500;color:var(--gris-700);border-radius:10px;transition:all .15s;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:var(--font-body)}
    .offcanvas-sidebar .nav-link:hover,.offcanvas-sidebar .nav-link.active{background:var(--rosa-50);color:var(--rosa-700)}

    /* Botones de navegación del sidebar fijo (versión escritorio) */
    .cc-sidebar-desktop .nav-link{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:500;color:var(--gris-700);border-left:3px solid transparent;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--font-body);transition:all .15s}
    .cc-sidebar-desktop .nav-link:hover{background:var(--rosa-50);color:var(--rosa-600);border-left-color:var(--rosa-200)}
    .cc-sidebar-desktop .nav-link.active{background:var(--rosa-50);color:var(--rosa-700);border-left-color:var(--rosa-500);font-weight:600}

    /* Ícono de cada opción del menú */
    .nav-icon{font-size:18px;flex-shrink:0}
    /* Contador rosado (ej: cantidad de items en el carrito) */
    .nav-count{margin-left:auto;background:var(--rosa-600);color:#fff;border-radius:12px;padding:1px 7px;font-size:11px;font-weight:700}

    /* Barra superior fija */
    .app-topbar{height:62px;background:#fff;border-bottom:1.5px solid var(--rosa-200);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(236,72,153,.08)}
    /* Círculo redondo que envuelve el logo en la topbar */
    .tb-logo-wrap{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rosa-500),var(--rosa-700));display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .tb-logo-wrap img{width:100%;height:100%;object-fit:cover}
    .tb-brand{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--rosa-700)}
    /* Botones circulares de ícono en la topbar (hamburguesa, carrito) */
    .tb-icon-btn{position:relative;font-size:20px;width:40px;height:40px;border-radius:8px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .tb-icon-btn:hover{background:var(--rosa-50)}
    /* Insignia numérica (ej: "3" productos en el carrito) sobre un ícono */
    .tb-badge{position:absolute;top:-3px;right:-3px;background:var(--rosa-600);color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

    /* Sidebar fijo de escritorio */
    .cc-sidebar-desktop{width:220px;background:#fff;border-right:1.5px solid var(--rosa-200);min-height:calc(100vh - 62px);flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding:14px 0}

    /* Área de contenido principal, donde user.js inyecta cada sección */
    #main-content{padding:20px;min-width:0;overflow-x:hidden}
    @media(max-width:576px){#main-content{padding:12px 10px}}
    .page-title{font-size:22px;color:var(--rosa-800);margin-bottom:4px}
    .page-sub{font-size:14px;color:var(--gris-400);margin-bottom:20px}

    /* Cuadrícula de tarjetas de producto: se acomoda sola según el ancho disponible */
    .prod-grid-resp{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    @media(max-width:400px){.prod-grid-resp{grid-template-columns:repeat(2,1fr)}}

    /* Fila de producto dentro del carrito */
    .cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gris-200)}
    @media(max-width:400px){.cart-item{flex-wrap:wrap}}
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     MENÚ LATERAL MÓVIL (offcanvas de Bootstrap)
     Se abre con el botón hamburguesa de la topbar.
     Solo visible en pantallas angostas (ver CSS arriba).
════════════════════════════════════════════════ -->
<div class="offcanvas offcanvas-start offcanvas-sidebar" tabindex="-1" id="offcanvasSidebar" style="width:260px">
  <div class="offcanvas-header" style="background:var(--rosa-50);border-bottom:1px solid var(--rosa-200)">
    <div class="d-flex align-items-center gap-2">
      <div class="tb-logo-wrap"><img src="../img/logo.jpeg" alt="confisoftw"></div>
      <span class="tb-brand">Confisoftw</span>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body px-0 py-2">
    <!-- Cada botón tiene un "data-section" que user.js usa para saber qué renderizar -->
    <button class="nav-link" data-section="productos"><span class="nav-icon">🛍️</span>Productos</button>
    <button class="nav-link" data-section="carrito">
      <span class="nav-icon">🛒</span>Carrito
      <span class="nav-count" id="nav-badge-carrito" style="display:none">0</span>
    </button>
    <button class="nav-link" data-section="historial"><span class="nav-icon">📋</span>Mis Pedidos</button>
    <button class="nav-link" data-section="perfil"><span class="nav-icon">👤</span>Mi Perfil</button>
    <hr class="my-2">
    <!-- Versión móvil del botón de cerrar sesión (se sincroniza con AuthService.logout al final del archivo) -->
    <button class="nav-link" id="btn-logout-mobile" style="color:var(--rosa-600)"><span class="nav-icon">🚪</span>Cerrar sesión</button>
  </div>
</div>

<div class="d-flex flex-column" style="min-height:100vh">

  <!-- ════════════════════════════════════════════════
       TOPBAR (barra superior, visible siempre)
  ════════════════════════════════════════════════ -->
  <header class="app-topbar d-flex align-items-center px-3 gap-2">
    <!-- Botón hamburguesa: abre el offcanvas de arriba (solo visible en móvil) -->
    <button class="tb-icon-btn" id="btn-hamburger" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar">☰</button>
    <div class="tb-logo-wrap ms-1"><img src="../img/logo.jpeg" alt="confisoftw"></div>
    <span class="tb-brand ms-1 tb-name-resp">Confisoftw</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <!-- Ícono de carrito con contador (llevará a la sección "carrito") -->
      <button class="tb-icon-btn" id="btn-ir-carrito" title="Carrito">
        🛒<span class="tb-badge" id="cart-badge" style="display:none">0</span>
      </button>
      <!-- Avatar y nombre del usuario con sesión iniciada (los llena user.js) -->
      <div class="d-flex align-items-center gap-2">
        <div class="cc-avatar" style="width:34px;height:34px;font-size:14px" id="tb-avatar">U</div>
        <span style="font-size:14px;font-weight:500;color:var(--gris-700)" id="tb-user-name" class="d-none d-md-inline">Usuario</span>
      </div>
    </div>
  </header>

  <div class="d-flex flex-grow-1">

    <!-- ════════════════════════════════════════════════
         SIDEBAR DE ESCRITORIO
         Misma navegación que el offcanvas móvil, pero fija
         y solo visible en pantallas grandes (d-none d-lg-flex).
    ════════════════════════════════════════════════ -->
    <nav class="cc-sidebar-desktop d-none d-lg-flex flex-column">
      <button class="nav-link" data-section="productos"><span class="nav-icon">🛍️</span>Productos</button>
      <button class="nav-link" data-section="carrito">
        <span class="nav-icon">🛒</span>Carrito
        <span class="nav-count" id="nav-badge-carrito-d" style="display:none">0</span>
      </button>
      <button class="nav-link" data-section="historial"><span class="nav-icon">📋</span>Mis Pedidos</button>
      <button class="nav-link" data-section="perfil"><span class="nav-icon">👤</span>Mi Perfil</button>
      <div style="height:1px;background:var(--rosa-200);margin:8px 16px"></div>
      <!-- Versión escritorio del botón de cerrar sesión (vinculado directo a AuthService.logout en user.js) -->
      <button class="nav-link" id="btn-logout" style="color:var(--rosa-600)"><span class="nav-icon">🚪</span>Cerrar sesión</button>
    </nav>

    <!-- ════════════════════════════════════════════════
         CONTENIDO PRINCIPAL
         user.js reemplaza este bloque con el HTML de cada
         sección (catálogo, carrito, pedidos, perfil).
    ════════════════════════════════════════════════ -->
    <main class="flex-grow-1" id="main-content">
      <div class="d-flex align-items-center justify-content-center" style="height:200px;color:var(--gris-400)">
        <div class="text-center"><div style="font-size:32px">⏳</div><p class="mt-2">Cargando...</p></div>
      </div>
    </main>
  </div>
</div>

<!-- Contenedor de notificaciones tipo "toast" -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════
     SCRIPTS
     Orden importante: cada archivo depende del anterior.
════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/models.js"></script>    <!-- Clases de datos: Usuario, Producto, etc. -->
<script src="../js/database.js"></script>  <!-- Acceso a la API (Supabase) y caché de datos -->
<script src="../js/auth.js"></script>      <!-- Sesión, carrito (StoreService), UI.toast -->
<script src="../js/user.js"></script>      <!-- Toda la lógica del panel de usuario/cliente -->
<script>
  // El botón de logout del menú móvil no está dentro del <nav> de escritorio que
  // user.js configura automáticamente, así que se conecta manualmente aquí.
  document.getElementById('btn-logout-mobile')?.addEventListener('click', AuthService.logout);

  // Mantiene sincronizados los dos contadores de carrito (el del menú móvil y
  // el del sidebar de escritorio), revisando el carrito cada segundo.
  function syncBadges(){
    const cnt = StoreService.cantidadCarrito();
    ['nav-badge-carrito','nav-badge-carrito-d'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.textContent=cnt;el.style.display=cnt>0?'inline-flex':'none';}
    });
  }
  setInterval(syncBadges, 1000);
</script>
</body>
</html>
