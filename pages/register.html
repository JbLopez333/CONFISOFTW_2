<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Crear cuenta</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>

<!-- ════════════════════════════════════════════════
     PANTALLA DE ÉXITO
     Oculta por defecto (la muestra app.js tras un registro
     exitoso, llenando los datos de sc-email, sc-rol, etc.)
════════════════════════════════════════════════ -->
<div class="success-overlay" id="success-overlay">
  <div class="confetti-container" id="confetti-container"></div>
  <div class="success-circle">✓</div>
  <h2 class="success-title">¡Perfil creado exitosamente!</h2>
  <p class="success-sub">Bienvenido/a a ConfíComputos,</p>
  <p class="success-name" id="success-username"></p>
  <div class="success-card">
    <div class="sc-row"><span class="sc-label">Correo</span><span class="sc-val" id="sc-email"></span></div>
    <div class="sc-row"><span class="sc-label">Tipo de cuenta</span><span class="sc-val" id="sc-rol"></span></div>
    <div class="sc-row"><span class="sc-label">Ciudad</span><span class="sc-val" id="sc-ciudad"></span></div>
    <div class="sc-row"><span class="sc-label">Teléfono</span><span class="sc-val" id="sc-tel"></span></div>
    <div class="sc-row"><span class="sc-label">Miembro desde</span><span class="sc-val" id="sc-fecha"></span></div>
  </div>
  <button class="btn btn-rosa btn-lg" id="btn-go-login">Iniciar sesión ahora →</button>
</div>

<!-- ════════════════════════════════════════════════
     FORMULARIO DE REGISTRO (3 pasos)
════════════════════════════════════════════════ -->
<div class="auth-page">
  <div class="auth-card register-card">
    <div class="auth-logo">
      <div class="logo-circle">
        <img src="../img/logo.jpeg" alt="confisoftw">
      </div>
      <h1>Confisoftw</h1>
      <p>Crea tu cuenta en segundos</p>
    </div>

    <!-- Barra visual de progreso: RegisterController.goStep()/nextStep() en app.js
         le agrega/quita la clase "active" a cada punto según el paso actual -->
    <div class="steps-bar">
      <div class="step-wrap">
        <div class="step-dot active" id="sdot1">1</div>
        <div class="step-label">Datos</div>
      </div>
      <div class="step-line" id="sline1"></div>
      <div class="step-wrap">
        <div class="step-dot" id="sdot2">2</div>
        <div class="step-label">Contacto</div>
      </div>
      <div class="step-line" id="sline2"></div>
      <div class="step-wrap">
        <div class="step-dot" id="sdot3">3</div>
        <div class="step-label">Seguridad</div>
      </div>
    </div>

    <!-- ── PASO 1: Datos personales y tipo de cuenta ──
         Nota de seguridad: el <select> solo ofrece "Cliente" a propósito.
         El registro público NUNCA puede crear cuentas de Administrador;
         eso lo garantiza el servidor (api/registrar.php), no solo esta pantalla. -->
    <div id="step-content-1">
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input id="reg-nombre" placeholder="Tu nombre"></div>
        <div class="form-group"><label>Apellido</label><input id="reg-apellido" placeholder="Tu apellido"></div>
      </div>
      <div class="form-group"><label>Correo electrónico</label><input type="email" id="reg-email" placeholder="correo@ejemplo.com"></div>
      <div class="form-group">
        <label>Tipo de cuenta</label>
        <select id="reg-rol">
    <option value="cliente">🛒 Cliente</option>

</select>
      </div>
      <div class="form-error" id="reg-err1"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px">
        <a href="../app.html" class="link-btn">← Volver al login</a>
        <button class="btn btn-rosa" id="btn-next1">Continuar →</button>
      </div>
    </div>

    <!-- ── PASO 2: Datos de contacto (oculto hasta completar el paso 1) ── -->
    <div id="step-content-2" style="display:none">
      <div class="form-group"><label>Teléfono</label><input id="reg-tel" placeholder="300 000 0000"></div>
      <div class="form-row">
        <div class="form-group"><label>Ciudad</label><input id="reg-ciudad" placeholder="Bogotá"></div>
        <div class="form-group"><label>Departamento</label><input id="reg-depto" placeholder="Cundinamarca"></div>
      </div>
      <div class="form-group"><label>Fecha de nacimiento</label><input type="date" id="reg-fecha"></div>
      <div class="form-error" id="reg-err2"></div>
      <div style="display:flex;gap:12px;margin-top:16px">
        <button class="btn btn-outline" style="flex:1" id="btn-back2">← Atrás</button>
        <button class="btn btn-rosa"   style="flex:2" id="btn-next2">Continuar →</button>
      </div>
    </div>

    <!-- ── PASO 3: Contraseña y confirmación (oculto hasta completar el paso 2) ──
         La contraseña se valida en app.js (validarPasswordSegura): mínimo 8
         caracteres, una mayúscula, un número y un símbolo. -->
    <div id="step-content-3" style="display:none">
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres">
        <!-- Barra de fuerza de contraseña: la llena/colorea app.js mientras el usuario escribe -->
        <div class="pass-bar-wrap"><div class="pass-bar-fill" id="pass-bar" style="width:0;background:var(--gris-200)"></div></div>
        <div class="pass-label-txt" id="pass-label"></div>
        <div style="font-size:12px;color:var(--gris-500);margin-top:4px">Debe incluir: mayúscula, número y símbolo (ej: !@#$%).</div>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="reg-pass2" placeholder="Repite tu contraseña">
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:16px">
        <input type="checkbox" id="reg-terms" style="width:16px;height:16px;margin-top:3px;accent-color:var(--rosa-600);flex-shrink:0">
        <label for="reg-terms" style="font-size:13px;color:var(--gris-700);cursor:pointer;line-height:1.5">
          Acepto los <span style="color:var(--rosa-600);font-weight:600">términos y condiciones</span> y la política de privacidad de ConfíComputos
        </label>
      </div>
      <div class="form-error" id="reg-err3"></div>
      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="btn btn-outline" style="flex:1" id="btn-back3">← Atrás</button>
        <!-- Dispara tryRegister() en app.js, que valida todo y llama a api/registrar.php -->
        <button class="btn btn-rosa"   style="flex:2" id="btn-register">🎉 Crear perfil</button>
      </div>
    </div>
  </div>
</div>

<!-- Contenedor de notificaciones tipo "toast" -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════
     SCRIPTS
     Orden importante: cada archivo depende del anterior.
════════════════════════════════════════════════ -->
<script src="../js/models.js"></script>    <!-- Clases de datos: Usuario, Producto, etc. -->
<script src="../js/database.js"></script>  <!-- Acceso a la API (Supabase) y caché de datos -->
<script src="../js/auth.js"></script>      <!-- Registro real (AuthService.register), UI.toast -->
<script src="../js/app.js"></script>       <!-- Lógica de esta página: pasos, validaciones -->
</body>
</html>
