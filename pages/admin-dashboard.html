<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Administrador</title>
  <!-- Variables de diseño compartidas + estilos generales de la app -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>

<!-- Contenedor general del panel: topbar + sidebar + contenido -->
<div class="app-shell">

  <!-- ════════════════════════════════════════════════
       TOPBAR (barra superior)
  ════════════════════════════════════════════════ -->
  <header class="topbar">
    <!-- Botón hamburguesa: solo visible en pantallas móviles (ver script al final) -->
    <button class="tb-icon-btn" id="btn-menu-toggle" style="display:none" aria-label="Menú">☰</button>

    <!-- Logo y nombre de la marca -->
    <div class="topbar-brand">
      <div class="tb-logo">
        <img src="../img/logo.jpeg" alt="Confisoftw">
      </div>
      <span class="tb-name">Confisoftw</span>
    </div>

    <div class="topbar-spacer"></div>

    <div class="tb-actions">
      <!-- Campana de notificaciones: lleva directo a "Pedidos en Tiempo Real" -->
      <button class="tb-icon-btn" onclick="AdminApp.renderSection('pedidos-live')" title="Notificaciones">
        🔔
        <span class="tb-badge" id="notif-badge" style="display:none">0</span>
      </button>
      <!-- Avatar y nombre del administrador con sesión iniciada (los llena admin.js) -->
      <div class="tb-user">
        <div class="avatar" id="tb-avatar">A</div>
        <span id="tb-user-name">Administrador</span>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- ════════════════════════════════════════════════
         SIDEBAR (menú lateral de navegación)
         Cada botón tiene un "data-section" que admin.js usa
         para saber qué contenido debe renderizar.
    ════════════════════════════════════════════════ -->
    <nav class="sidebar" id="sidebar">
      <button class="nav-item" data-section="productos">
        <span class="nav-icon">📦</span><span>Productos</span>
      </button>
      <button class="nav-item" data-section="inventario">
        <span class="nav-icon">📊</span><span>Inventario</span>
      </button>
      <button class="nav-item" data-section="historial-inv">
        <span class="nav-icon">📈</span><span>Historial Inventario</span>
      </button>
      <button class="nav-item" data-section="pedidos-admin">
        <span class="nav-icon">🧾</span><span>Pedidos Clientes</span>
      </button>
      <button class="nav-item" data-section="pedidos-live">
        <span class="nav-icon">🔔</span><span>Pedidos en Tiempo Real</span>
      </button>
      <button class="nav-item" data-section="usuarios">
        <span class="nav-icon">👥</span><span>Usuarios</span>
      </button>
      <button class="nav-item" data-section="perfil">
        <span class="nav-icon">👤</span><span>Mi Perfil</span>
      </button>
      <div class="nav-sep"></div>
      <!-- Cierra sesión: vinculado a AuthService.logout en admin.js -->
      <button class="nav-item nav-logout" id="btn-logout">
        <span class="nav-icon">🚪</span><span>Cerrar sesión</span>
      </button>
    </nav>

    <!-- ════════════════════════════════════════════════
         CONTENIDO PRINCIPAL
         admin.js reemplaza este bloque con el HTML de cada
         sección (productos, usuarios, inventario, etc.)
    ════════════════════════════════════════════════ -->
    <main class="content" id="main-content">
      <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--gris-400)">
        Cargando...
      </div>
    </main>
  </div>
</div>

<!-- Contenedor de notificaciones tipo "toast" (mensajes emergentes de éxito/error) -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════
     SCRIPTS
     Orden importante: cada archivo depende del anterior.
════════════════════════════════════════════════ -->
<script src="../js/models.js"></script>    <!-- Clases de datos: Usuario, Producto, etc. -->
<script src="../js/database.js"></script>  <!-- Acceso a la API (Supabase) y caché de datos -->
<script src="../js/auth.js"></script>      <!-- Sesión, permisos de administrador, UI.toast -->
<script src="../js/admin.js"></script>     <!-- Toda la lógica del panel de administrador -->

<script>
// Muestra el botón de menú hamburguesa solo en pantallas angostas (móvil/tablet),
// y lo oculta si la ventana se agranda (por ejemplo, al girar el celular).
if (window.innerWidth <= 900) {
  document.getElementById('btn-menu-toggle').style.display = 'flex';
}
window.addEventListener('resize', () => {
  document.getElementById('btn-menu-toggle').style.display =
    window.innerWidth <= 900 ? 'flex' : 'none';
});
</script>
</body>
</html>
